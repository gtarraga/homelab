apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostfolio-redis
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghostfolio-redis
  template:
    metadata:
      labels:
        app: ghostfolio-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghostfolio-env
                  key: REDIS_PASSWORD
          command:
            - /bin/sh
            - -c
            - redis-server --requirepass "$REDIS_PASSWORD"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli --pass "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli --pass "$REDIS_PASSWORD" ping | grep PONG
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ghostfolio-redis
  namespace: apps
spec:
  selector:
    app: ghostfolio-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
