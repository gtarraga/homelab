apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-redis-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-redis
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-redis
  template:
    metadata:
      labels:
        app: sure-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sure-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: sure-redis
  namespace: apps
spec:
  selector:
    app: sure-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
