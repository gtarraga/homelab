apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config-hooks
  namespace: apps
data:
  03-custom-providers: |
    #!/command/with-contenv sh
    set -eu

    mkdir -p /opt/data/plugins/model-providers/litellm
    mkdir -p /opt/data/plugins/model-providers/bifrost

    cp /etc/hermes-config-hooks/litellm__init__.py \
       /opt/data/plugins/model-providers/litellm/__init__.py
    cp /etc/hermes-config-hooks/litellm_plugin.yaml \
       /opt/data/plugins/model-providers/litellm/plugin.yaml
    cp /etc/hermes-config-hooks/bifrost__init__.py \
       /opt/data/plugins/model-providers/bifrost/__init__.py
    cp /etc/hermes-config-hooks/bifrost_plugin.yaml \
       /opt/data/plugins/model-providers/bifrost/plugin.yaml

    /opt/hermes/.venv/bin/python - <<'PY'
    from pathlib import Path
    import yaml

    config_path = Path('/opt/data/config.yaml')
    if config_path.exists():
        config = yaml.safe_load(config_path.read_text()) or {}
        providers = config.get('custom_providers') or []
        cleaned = [p for p in providers
                   if isinstance(p, dict) and p.get('name') not in ('litellm', 'bifrost')]
        if len(cleaned) != len(providers):
            config['custom_providers'] = cleaned
            config_path.write_text(yaml.safe_dump(config, sort_keys=False))
            print('[custom-providers] removed litellm/bifrost from custom_providers')
    PY

    echo "[custom-providers] litellm and bifrost plugins ready"

  litellm__init__.py: |
    from providers import register_provider
    from providers.base import ProviderProfile

    register_provider(ProviderProfile(
        name="litellm",
        aliases=("litellm",),
        display_name="LiteLLM",
        description="LiteLLM proxy — homelab",
        env_vars=("LITELLM_API_KEY", "LITELLM_BASE_URL"),
        base_url="http://litellm.aiops.svc.cluster.local:4000/v1",
        auth_type="api_key",
        fallback_models=("gpt-5.5", "gpt-5.4-mini"),
        default_aux_model="gpt-5.4-mini",
    ))

  litellm_plugin.yaml: |
    name: litellm
    kind: model-provider
    version: 1.0.0
    description: LiteLLM proxy — homelab

  bifrost__init__.py: |
    from providers import register_provider
    from providers.base import ProviderProfile

    register_provider(ProviderProfile(
        name="bifrost",
        aliases=("bifrost",),
        display_name="Bifrost",
        description="Bifrost proxy — homelab",
        env_vars=("BIFROST_API_KEY", "BIFROST_BASE_URL"),
        base_url="http://bifrost.aiops.svc.cluster.local:8080/v1",
        auth_type="api_key",
        fallback_models=(),
        default_aux_model=None,
    ))

  bifrost_plugin.yaml: |
    name: bifrost
    kind: model-provider
    version: 1.0.0
    description: Bifrost proxy — homelab
