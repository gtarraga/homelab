apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config-hooks
  namespace: apps
data:
  03-custom-providers: |
    #!/command/with-contenv sh
    set -eu

    /opt/hermes/.venv/bin/python - <<'PY'
    from pathlib import Path
    import yaml

    config_path = Path('/opt/data/config.yaml')
    config = yaml.safe_load(config_path.read_text()) or {}

    desired = {
        'litellm': {
            'name': 'litellm',
            'base_url': 'http://litellm.aiops.svc.cluster.local:4000/v1',
            'key_env': 'LITELLM_MASTER_KEY',
            'api_mode': 'chat_completions',
            'model': 'gpt-5.5',
        },
        'bifrost': {
            'name': 'bifrost',
            'base_url': 'http://bifrost.aiops.svc.cluster.local:8080/v1',
            'api_mode': 'chat_completions',
        },
    }

    providers = config.get('custom_providers') or []
    by_name = {
        provider.get('name'): provider
        for provider in providers
        if isinstance(provider, dict) and provider.get('name')
    }

    changed = False
    for name, provider in desired.items():
        if by_name.get(name) != provider:
            by_name[name] = provider
            changed = True

    ordered = []
    seen = set()
    for provider in providers:
        name = provider.get('name') if isinstance(provider, dict) else None
        if name in desired:
            ordered.append(by_name[name])
            seen.add(name)
        else:
            ordered.append(provider)
    for name in desired:
        if name not in seen:
            ordered.append(by_name[name])
            changed = True

    if changed or config.get('custom_providers') != ordered:
        config['custom_providers'] = ordered
        config_path.write_text(yaml.safe_dump(config, sort_keys=False))
        print('[custom-providers] configured litellm and bifrost')
    else:
        print('[custom-providers] already configured')
    PY
