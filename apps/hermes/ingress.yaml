apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-api
  namespace: apps
spec:
  ingressClassName: traefik
  rules:
    - host: hermes.stoneforge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes
                port:
                  number: 8642
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-dashboard
  namespace: apps
spec:
  ingressClassName: traefik
  rules:
    - host: hermes-dashboard.stoneforge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes
                port:
                  number: 9119
