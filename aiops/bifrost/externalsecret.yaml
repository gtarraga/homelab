apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost-secret
  namespace: aiops
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: bifrost-secret
    creationPolicy: Owner
  data:
    - secretKey: BIFROST_ENCRYPTION_KEY
      remoteRef:
        key: /homelab/apps/bifrost/BIFROST_ENCRYPTION_KEY
