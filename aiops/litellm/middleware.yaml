apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: litellm-root-redirect
  namespace: aiops
spec:
  redirectRegex:
    regex: ^https?://([^/]+)/?$
    replacement: https://${1}/ui/
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: litellm-ui-login
  namespace: aiops
spec:
  replacePath:
    path: /fallback/login
