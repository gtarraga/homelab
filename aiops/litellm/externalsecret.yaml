apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secret
  namespace: aiops
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-ssm
  target:
    name: litellm-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        LITELLM_SALT_KEY: "{{ .LITELLM_SALT_KEY }}"
        DATABASE_URL: "postgresql://litellm:{{ .POSTGRES_PASSWORD }}@litellm-postgres.aiops.svc.cluster.local:5432/litellm"
        REDIS_HOST: litellm-redis.aiops.svc.cluster.local
        REDIS_PORT: "6379"
        REDIS_PASSWORD: "{{ .REDIS_PASSWORD }}"
        UI_USERNAME: "{{ .UI_USERNAME }}"
        UI_PASSWORD: "{{ .UI_PASSWORD }}"
        POSTGRES_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
  data:
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: /homelab/apps/litellm/LITELLM_MASTER_KEY
    - secretKey: LITELLM_SALT_KEY
      remoteRef:
        key: /homelab/apps/litellm/LITELLM_SALT_KEY
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /homelab/apps/litellm/POSTGRES_PASSWORD
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /homelab/apps/litellm/REDIS_PASSWORD
    - secretKey: UI_USERNAME
      remoteRef:
        key: /homelab/apps/litellm/UI_USERNAME
    - secretKey: UI_PASSWORD
      remoteRef:
        key: /homelab/apps/litellm/UI_PASSWORD
