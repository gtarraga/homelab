apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mlflow
  namespace: aiops
spec:
  interval: 10m
  timeout: 10m
  targetNamespace: aiops
  chart:
    spec:
      chart: mlflow
      version: "5.1.17"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      tag: 3.3.2-debian-12-r0

    tracking:
      auth:
        enabled: false
      runUpgradeDB: true
      ingress:
        enabled: true
        ingressClassName: traefik
        hostname: mlflow.stoneforge.dev
        path: /
        pathType: Prefix
      metrics:
        enabled: false
        serviceMonitor:
          enabled: false
      resourcesPreset: small

    postgresql:
      enabled: true
      auth:
        username: bn_mlflow
        database: bitnami_mlflow
      architecture: standalone
      primary:
        persistence:
          enabled: true
          storageClass: local-path
          size: 8Gi

    minio:
      enabled: true
      defaultBuckets: mlflow
      provisioning:
        enabled: true
        # Keep Bitnami default behavior so MLflow UI artifact downloads work.
        # MinIO stays ClusterIP/private; do not expose it publicly.
        extraCommands:
          - mc anonymous set download provisioning/mlflow
      service:
        type: ClusterIP
      persistence:
        enabled: true
        storageClass: local-path
        size: 20Gi
      console:
        enabled: false
