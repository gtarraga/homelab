apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: aiops
type: Opaque
stringData:
  # PoC-only credentials. MinIO is ClusterIP only, not exposed.
  root-user: minioadmin
  root-password: minioadmin
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: aiops
spec:
  type: ClusterIP
  selector:
    app: mlflow-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: aiops
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-minio
  template:
    metadata:
      labels:
        app: mlflow-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-07-23T15-54-02Z
          args:
            - server
            - /data
            - --address
            - :9000
          ports:
            - name: api
              containerPort: 9000
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: aiops
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-07-21T05-28-08Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          command:
            - sh
            - -c
            - |
              set -eu
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 2
              done
              mc mb --ignore-existing local/mlflow
