apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: infra
spec:
  interval: 10m
  targetNamespace: infra
  chart:
    spec:
      chart: cloudflare-tunnel-remote
      version: "0.1.2"
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: flux-system
  values:
    replicaCount: 2
  valuesFrom:
    - kind: Secret
      name: cloudflared-tunnel-token
      valuesKey: token
      targetPath: cloudflare.tunnel_token
