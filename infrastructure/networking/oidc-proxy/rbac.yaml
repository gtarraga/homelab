apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oidc-proxy
rules:
  - nonResourceURLs:
      - /.well-known/openid-configuration
      - /openid/v1/jwks
    verbs:
      - get

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oidc-proxy
subjects:
  - kind: ServiceAccount
    name: oidc-proxy
    namespace: infra

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oidc-proxy
  namespace: infra
