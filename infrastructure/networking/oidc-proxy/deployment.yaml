apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-proxy
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oidc-proxy
  template:
    metadata:
      labels:
        app: oidc-proxy
    spec:
      serviceAccountName: oidc-proxy
      containers:
        - name: oidc-proxy
          image: ghcr.io/gtarraga/oidc-proxy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
