apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard
  namespace: infra
spec:
  ingressClassName: traefik
  rules:
    - host: adguard.stoneforge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard
                port:
                  number: 5501
