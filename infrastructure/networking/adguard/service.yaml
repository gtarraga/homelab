apiVersion: v1
kind: Service
metadata:
  name: adguard
  namespace: infra
  annotations:
    metallb.io/loadBalancerIPs: 192.168.1.52
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  externalIPs:
    # Tailscale DNS uses jitte's tailnet IP as nameserver. Keep that stable
    # while AdGuard itself is exposed through MetalLB on the LAN VIP.
    - 100.116.188.19
  selector:
    app: adguard
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: http
      port: 5501
      targetPort: 5501
      protocol: TCP
