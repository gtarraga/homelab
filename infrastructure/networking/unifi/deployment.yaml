apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi
  namespace: infra
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi
  template:
    metadata:
      labels:
        app: unifi
    spec:
      nodeSelector:
        kubernetes.io/hostname: jitte
      containers:
        - name: unifi
          image: lscr.io/linuxserver/unifi-network-application:10.3.58
          imagePullPolicy: IfNotPresent
          ports:
            - name: https-admin
              containerPort: 8443
              protocol: TCP
            - name: inform
              containerPort: 8080
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
            - name: discovery
              containerPort: 10001
              protocol: UDP
            - name: speedtest
              containerPort: 6789
              protocol: TCP
            - name: guest-http
              containerPort: 8880
              protocol: TCP
            - name: guest-https
              containerPort: 8843
              protocol: TCP
            - name: ssdp
              containerPort: 1900
              protocol: UDP
            - name: syslog
              containerPort: 5514
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Madrid
            - name: MONGO_USER
              value: unifi
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-mongo-env
                  key: MONGO_PASS
            - name: MONGO_HOST
              value: unifi-mongo
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_DBNAME
              value: unifi
            - name: MONGO_AUTHSOURCE
              value: admin
            - name: MEM_STARTUP
              value: "512"
            - name: MEM_LIMIT
              value: "1024"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: unifi-config
