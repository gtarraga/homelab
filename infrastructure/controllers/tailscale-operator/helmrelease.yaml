apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: infra
spec:
  interval: 10m
  targetNamespace: tailscale
  chart:
    spec:
      chart: tailscale-operator
      version: "1.88.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  values:
    operator:
      oauth:
        clientId: ""
        clientSecret: ""
        existingSecret: tailscale-oauth
      hostname: jitte
      tags:
        - k8s-operator
      stateful: true