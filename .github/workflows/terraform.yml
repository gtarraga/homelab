name: Terraform

on:
  push:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::849279003196:role/github-homelab-terraform
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v4

      - name: Format check
        run: terraform fmt -check -recursive terraform

      - name: Init
        run: terraform -chdir=terraform init -input=false

      - name: Validate
        run: terraform -chdir=terraform validate

      - name: Plan
        id: plan
        run: |
          set -euo pipefail
          set +e
          terraform -chdir=terraform plan -input=false -no-color -detailed-exitcode -out=tfplan
          code=$?
          set -e

          if [ "$code" -eq 1 ]; then
            echo "Plan failed"
            exit 1
          fi

          has_changes="false"
          if [ "$code" -eq 2 ]; then
            has_changes="true"
          fi
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan.outputs.has_changes == 'true'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::849279003196:role/github-homelab-terraform
          aws-region: eu-west-1

      - uses: hashicorp/setup-terraform@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Init
        run: terraform -chdir=terraform init -input=false

      - name: Apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan
