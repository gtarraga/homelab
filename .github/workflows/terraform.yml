name: Terraform

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  push:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-main
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform plan all modules
        run: |
          set -euo pipefail
          found="false"
          for dir in terraform/*/; do
            [ -d "$dir" ] || continue
            found="true"
            echo "==> Planning $dir"
            terraform -chdir="$dir" init -input=false
            terraform -chdir="$dir" validate
            terraform -chdir="$dir" plan -input=false -no-color
          done
          if [ "$found" = "false" ]; then
            echo "No terraform modules found under terraform/"
          fi

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event_name != 'pull_request' }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply all modules
        run: |
          set -euo pipefail
          found="false"
          for dir in terraform/*/; do
            [ -d "$dir" ] || continue
            found="true"
            echo "==> Applying $dir"
            terraform -chdir="$dir" init -input=false
            terraform -chdir="$dir" validate
            terraform -chdir="$dir" apply -input=false -auto-approve
          done
          if [ "$found" = "false" ]; then
            echo "No terraform modules found under terraform/"
          fi
