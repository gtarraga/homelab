name: Terraform

on:
  push:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform.yml

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive terraform

      - name: Init
        run: terraform -chdir=terraform init -input=false -backend-config=backend.tfvars

      - name: Validate
        run: terraform -chdir=terraform validate

      - name: Plan
        id: plan
        run: |
          set +e
          terraform -chdir=terraform plan -input=false -no-color -detailed-exitcode -out=tfplan
          code=$?
          set -e
          if [ "$code" -eq 1 ]; then exit 1; fi
          echo "has_changes=$([ "$code" -eq 2 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.plan.outputs.has_changes == 'true'
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan
